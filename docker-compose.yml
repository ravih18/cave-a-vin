services:
  app:
    build: .
    container_name: cave-app
    restart: unless-stopped
    environment:
      - PIN_CODE=${PIN_CODE:-1234}
      - DATABASE_URL=sqlite:///./data/cave.db
    volumes:
      - cave-data:/app/data
    expose:
      - "8000"
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
    name: proxy-net

volumes:
  cave-data: